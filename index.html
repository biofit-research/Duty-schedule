<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>당직 스케줄러</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#faf9f5; --surface:#ffffff; --surface2:#f1efe8; --surface3:#e9e7df;
    --text:#1a1a18; --text2:#5f5e5a; --text3:#888780;
    --border:#d3d1c7; --accent:#185fa5; --accent-bg:#e6f1fb;
    --danger:#a32d2d; --warn-bg:#faeeda; --warn-text:#854f0b;
    --radius:12px; --radius-sm:8px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo",
      "Malgun Gothic",sans-serif; line-height:1.6;
  }
  .wrap{max-width:760px; margin:0 auto; padding:2rem 1.25rem 4rem;}
  h1{font-size:24px; font-weight:600; margin:0 0 4px;}
  .sub{color:var(--text2); font-size:14px; margin:0 0 2rem;}
  .card{background:var(--surface2); border-radius:var(--radius); padding:1rem 1.25rem; margin-bottom:1.25rem;}
  .card-title{font-size:14px; font-weight:600; margin-bottom:12px;}
  .row{display:flex; gap:8px; align-items:center;}
  .members{display:flex; flex-direction:column; gap:10px; margin-bottom:10px;}
  .mname{flex:0 0 84px; font-size:14px; font-weight:600;}
  .mrow{display:grid; grid-template-columns:84px 1fr auto; gap:8px; align-items:center;}
  .mrow2{display:grid; grid-template-columns:84px 1fr 1fr; gap:8px; align-items:center; margin-top:-2px;}
  .qlabel{font-size:12px; color:var(--text3); white-space:nowrap;}
  .qfield{display:flex; align-items:center; gap:6px;}
  .qfield input{height:34px;}
  .mcard{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px 12px; display:flex; flex-direction:column; gap:8px;}
  input[type=text],input[type=number]{
    height:38px; padding:0 12px; border:1px solid var(--border); border-radius:var(--radius-sm);
    background:var(--surface); color:var(--text); font-size:14px; font-family:inherit; width:100%;
  }
  input:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-bg);}
  button{
    height:38px; padding:0 16px; border:1px solid var(--border); border-radius:var(--radius-sm);
    background:var(--surface); color:var(--text); font-size:14px; font-weight:500; cursor:pointer;
    font-family:inherit; transition:background .12s;
  }
  button:hover{background:var(--surface3);} button:active{transform:scale(.98);}
  .btn-primary{border:2px solid var(--accent); width:100%; margin-top:14px;}
  .btn-del{padding:0 12px; flex:0 0 auto;}
  .grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px;}
  label.field{font-size:13px; color:var(--text2); display:block; margin-bottom:4px;}
  .hint{font-size:12px; color:var(--text3); margin:8px 0 0;}
  .check{display:flex; align-items:center; gap:8px; margin-top:12px; font-size:13px; color:var(--text2); cursor:pointer;}
  .check input{width:auto; height:auto;}
  .stats{display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:10px; margin:1rem 0 1.25rem;}
  .stat{background:var(--surface2); border-radius:var(--radius-sm); padding:10px 12px;}
  .stat .l{font-size:13px; color:var(--text2);}
  .stat .v{font-size:22px; font-weight:600;}
  .stat .v small{font-size:13px; color:var(--text3); font-weight:400;}
  table{width:100%; border-collapse:collapse; font-size:13px;}
  .tablewrap{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden;}
  thead tr{background:var(--surface2);}
  th{text-align:left; padding:8px 12px; font-weight:600;}
  td{padding:7px 12px; border-top:1px solid var(--border);}
  tr.weekend{background:var(--surface2);}
  .weekend td.dim{color:var(--danger);}
  .duty{font-weight:600;}
  .warn{background:var(--warn-bg); color:var(--warn-text); padding:10px 14px; border-radius:var(--radius-sm); font-size:13px; margin-bottom:8px;}
  .hidden{display:none;}
  .export{margin-top:1rem;}
</style>
</head>
<body>
<div class="wrap">
  <h1>당직 스케줄러</h1>
  <p class="sub">구성원·휴가·규칙을 설정하면 한 달 당직표를 공평하게 생성하고 엑셀로 내보냅니다.</p>

  <div class="card">
    <div class="card-title">구성원 · 휴가</div>
    <div id="members" class="members"></div>
    <div class="row">
      <input id="newName" type="text" placeholder="이름 입력" />
      <button id="addBtn" style="white-space:nowrap;">+ 추가</button>
    </div>
    <p class="hint">휴가일은 날짜를 쉼표로 입력 (예: 3,4,17). 그 날은 당직에서 제외됩니다.</p>
  </div>

  <div class="card">
    <div class="card-title">규칙</div>
    <div class="grid">
      <div>
        <label class="field">연 / 월</label>
        <div class="row">
          <input id="year" type="number" value="2026" min="2024" max="2030" />
          <input id="month" type="number" value="6" min="1" max="12" />
        </div>
      </div>
    </div>
    <label class="check"><input id="noConsec" type="checkbox" checked /> 같은 사람 연속 당직 방지</label>
    <p class="hint">하루 배정 인원은 구성원 각자에게 정한 당직 일수의 합으로 자동 결정됩니다. 평일 총합 / 주말 총합이 그 달의 평일 수 / 주말 수와 맞아야 빈자리 없이 채워집니다.</p>
    <button id="genBtn" class="btn-primary">당직표 생성</button>
  </div>

  <div id="output"></div>
  <div id="exportWrap" class="export hidden">
    <button id="exportBtn" style="width:100%;">엑셀(.xlsx) 파일로 내보내기</button>
  </div>
</div>

<script>
(function(){
  const state = { members: [], lastSchedule: null, lastMeta: null };
  let nid = 0;
  const dowNames = ['일','월','화','수','목','금','토'];

  function addMember(name){ state.members.push({ id:++nid, name:name, vac:"", wd:5, we:2 }); renderMembers(); }
  ["김민준","이서연","박지후","최예린"].forEach(addMember);

  function renderMembers(){
    const c = document.getElementById('members'); c.innerHTML = '';
    state.members.forEach(m=>{
      const card = document.createElement('div');
      card.className = 'mcard';
      card.innerHTML =
        '<div class="mrow">'+
          '<span class="mname">'+m.name+'</span>'+
          '<input type="text" placeholder="휴가일 (예: 3,4,17)" value="'+m.vac+'" data-vac="'+m.id+'" />'+
          '<button class="btn-del" data-del="'+m.id+'" aria-label="삭제">삭제</button>'+
        '</div>'+
        '<div class="mrow2">'+
          '<span></span>'+
          '<span class="qfield"><span class="qlabel">평일 당직</span><input type="number" min="0" value="'+m.wd+'" data-wd="'+m.id+'" /></span>'+
          '<span class="qfield"><span class="qlabel">주말 당직</span><input type="number" min="0" value="'+m.we+'" data-we="'+m.id+'" /></span>'+
        '</div>';
      c.appendChild(card);
    });
    c.querySelectorAll('[data-vac]').forEach(i=>i.addEventListener('input',e=>{
      const m = state.members.find(x=>x.id==e.target.dataset.vac); if(m) m.vac = e.target.value;
    }));
    c.querySelectorAll('[data-wd]').forEach(i=>i.addEventListener('input',e=>{
      const m = state.members.find(x=>x.id==e.target.dataset.wd); if(m) m.wd = Math.max(0, parseInt(e.target.value,10)||0);
    }));
    c.querySelectorAll('[data-we]').forEach(i=>i.addEventListener('input',e=>{
      const m = state.members.find(x=>x.id==e.target.dataset.we); if(m) m.we = Math.max(0, parseInt(e.target.value,10)||0);
    }));
    c.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',e=>{
      state.members = state.members.filter(x=>x.id!=e.currentTarget.dataset.del); renderMembers();
    }));
  }

  document.getElementById('addBtn').addEventListener('click',()=>{
    const v = document.getElementById('newName').value.trim();
    if(v){ addMember(v); document.getElementById('newName').value=''; }
  });
  document.getElementById('newName').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('addBtn').click(); });

  function parseVac(s){ return new Set(String(s||'').split(',').map(x=>parseInt(x.trim(),10)).filter(x=>!isNaN(x))); }

  function generate(){
    const year=+document.getElementById('year').value, month=+document.getElementById('month').value;
    const noConsec=document.getElementById('noConsec').checked;
    const out=document.getElementById('output');

    if(state.members.length===0){ out.innerHTML='<p style="color:var(--danger);">구성원을 추가하세요.</p>'; document.getElementById('exportWrap').classList.add('hidden'); return; }

    const members=state.members.map(m=>({ name:m.name, vac:parseVac(m.vac), wd:m.wd, we:m.we, remWd:m.wd, remWe:m.we, load:0 }));
    const daysInMonth=new Date(year,month,0).getDate();

    // build day list
    const days=[];
    let weekdayTotal=0, weekendTotal=0;
    for(let d=1; d<=daysInMonth; d++){
      const dow=new Date(year,month-1,d).getDay();
      const isWeekend=(dow===0||dow===6);
      if(isWeekend) weekendTotal++; else weekdayTotal++;
      days.push({ d, dow, isWeekend, names:[] });
    }

    const sumWd=members.reduce((a,m)=>a+m.wd,0);
    const sumWe=members.reduce((a,m)=>a+m.we,0);

    let warnings=[];
    if(sumWd!==weekdayTotal) warnings.push('ℹ '+month+'월 평일은 '+weekdayTotal+'일인데 평일 당직 합계는 '+sumWd+'회입니다. ('+(sumWd>weekdayTotal?'하루 2명 이상 배정되거나':'빈 평일이 생기거나')+' 채우지 못할 수 있음)');
    if(sumWe!==weekendTotal) warnings.push('ℹ '+month+'월 주말은 '+weekendTotal+'일인데 주말 당직 합계는 '+sumWe+'회입니다. ('+(sumWe>weekendTotal?'하루 2명 이상 배정되거나':'빈 주말이 생기거나')+' 채우지 못할 수 있음)');

    // greedy: for each day in order, fill at least one slot using member with most remaining quota
    // capacity per day = ceil(totalRemaining / remainingDaysOfType) so quotas spread out
    function schedule(isWeekend){
      const dayList=days.filter(x=>x.isWeekend===isWeekend);
      const key=isWeekend?'remWe':'remWd';
      let prevNames=new Set();
      for(let i=0;i<dayList.length;i++){
        const day=dayList[i];
        const remainingDays=dayList.length-i;
        const totalRem=members.reduce((a,m)=>a+m[key],0);
        if(totalRem<=0) break;
        // how many to place today so the rest spread evenly across remaining days
        let need=Math.ceil(totalRem/remainingDays);
        let cand=members.filter(m=>m[key]>0 && !m.vac.has(day.d));
        if(noConsec){
          const f=cand.filter(m=>!prevNames.has(m.name));
          if(f.length>=Math.min(need,1)) cand=f.length>0?f:cand;
        }
        cand.sort((a,b)=> b[key]-a[key] || Math.random()-0.5);
        const take=cand.slice(0, Math.min(need, cand.length));
        take.forEach(m=>{ m[key]--; m.load++; day.names.push(m.name); });
        prevNames=new Set(take.map(m=>m.name));
        if(take.length===0 && need>0){
          warnings.push('⚠ '+month+'/'+day.d+'일: 배정 가능한 인원이 없습니다 (휴가/할당 소진).');
        }
      }
    }
    schedule(false);
    schedule(true);

    members.forEach(m=>{
      if(m.remWd>0) warnings.push('⚠ '+m.name+': 평일 당직 '+m.remWd+'회를 배정하지 못했습니다.');
      if(m.remWe>0) warnings.push('⚠ '+m.name+': 주말 당직 '+m.remWe+'회를 배정하지 못했습니다.');
    });

    state.lastSchedule=days;
    state.lastMeta={ year, month, members: members.map(m=>({name:m.name, wd:m.wd-m.remWd, we:m.we-m.remWe, load:m.load})) };

    let html='';
    [...new Set(warnings)].forEach(w=>{ html+='<div class="warn">'+w+'</div>'; });
    html+='<div class="stats">';
    state.lastMeta.members.forEach(m=>{ html+='<div class="stat"><div class="l">'+m.name+'</div><div class="v">'+m.load+'<small> 회 (평'+m.wd+'/주'+m.we+')</small></div></div>'; });
    html+='</div>';
    html+='<div class="tablewrap"><table><thead><tr><th>날짜</th><th>요일</th><th>당직</th></tr></thead><tbody>';
    days.forEach(s=>{
      html+='<tr class="'+(s.isWeekend?'weekend':'')+'"><td class="dim">'+s.d+'</td><td class="dim">'+dowNames[s.dow]+'</td><td class="duty">'+(s.names.join(', ')||'—')+'</td></tr>';
    });
    html+='</tbody></table></div>';
    out.innerHTML=html;
    document.getElementById('exportWrap').classList.remove('hidden');
  }

  document.getElementById('genBtn').addEventListener('click',generate);

  document.getElementById('exportBtn').addEventListener('click',()=>{
    if(!state.lastSchedule) return;
    const m=state.lastMeta;
    const sheet1=[['날짜','요일','당직자']];
    state.lastSchedule.forEach(s=>{
      sheet1.push([m.month+'월 '+s.d+'일', dowNames[s.dow], s.names.join(', ')]);
    });
    const sheet2=[['이름','평일 당직','주말 당직','총 당직횟수']];
    m.members.forEach(x=>sheet2.push([x.name, x.wd, x.we, x.load]));

    const wb=XLSX.utils.book_new();
    const ws1=XLSX.utils.aoa_to_sheet(sheet1); ws1['!cols']=[{wch:12},{wch:6},{wch:30}];
    const ws2=XLSX.utils.aoa_to_sheet(sheet2); ws2['!cols']=[{wch:12},{wch:10},{wch:10},{wch:12}];
    XLSX.utils.book_append_sheet(wb, ws1, '당직표');
    XLSX.utils.book_append_sheet(wb, ws2, '당직횟수요약');
    XLSX.writeFile(wb, m.year+'년_'+m.month+'월_당직표.xlsx');
  });
})();
</script>
</body>
</html>
